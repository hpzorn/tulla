# research-ralph.conf - Configuration for Research-First Ralph
#
# This file is sourced by research-ralph.sh at startup.
# Uncomment and modify settings as needed.

# =============================================================================
# Directories
# =============================================================================

# Where the idea pool is located (used by idea-pool MCP)
# IDEA_POOL_DIR="$HOME/ideas"

# Working directory for logs and temporary files
# WORK_DIR="$SCRIPT_DIR/work"

# =============================================================================
# Timing & Limits
# =============================================================================

# How long to sleep (seconds) when no ideas are available
# SLEEP_INTERVAL=3600

# Maximum retry attempts for implementation before marking as failed
# MAX_IMPLEMENTATION_RETRIES=3

# Time limit (minutes) for the research phase
# RESEARCH_TIME_BOX_MINUTES=30

# =============================================================================
# Decomposition Thresholds
# =============================================================================

# Ideas with more than this many success criteria get decomposed
# MAX_SUCCESS_CRITERIA=5

# Ideas with more than this many independent components get decomposed
# MAX_INDEPENDENT_COMPONENTS=3

# =============================================================================
# Behavior
# =============================================================================

# Run in dry-run mode by default (true/false)
# DRY_RUN=false

# Run only once and exit (true/false)
# SINGLE_RUN=false

# Process a specific idea by default (empty = auto-select from backlog)
# SPECIFIC_IDEA=""

# Pause for human review between phases (true/false)
# INTERACTIVE=false

# =============================================================================
# Cost Controls (Future)
# =============================================================================

# Maximum API cost per idea (in dollars) - not yet implemented
# MAX_COST_PER_IDEA=5.00

# Alert threshold for API costs - not yet implemented
# COST_ALERT_THRESHOLD=10.00

# =============================================================================
# Notifications (Future)
# =============================================================================

# Webhook URL for completion notifications - not yet implemented
# NOTIFICATION_WEBHOOK=""

# Email for alerts - not yet implemented
# ALERT_EMAIL=""
